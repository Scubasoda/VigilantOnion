name: VigilantOnion Run

on:
  schedule:
    - cron: '0 0 * * *' # Runs daily at midnight. Change as needed.
  workflow_dispatch:      # Allows you to run it manually from the "Actions" tab.

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install and Start Tor
        run: |
          sudo apt-get update
          sudo apt-get install -y tor
          sudo service tor start
          # Wait for Tor to initialize
          sleep 10

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run VigilantOnion
        run: |
          # Redirecting output to results.txt
          # You can change the flags (--crawler, --search, etc.) based on your needs
          python3 observer.py --config config/config.yml --crawler > results.txt 2>&1

      - name: Commit and Push Results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add results.txt
          # Only commit if there are changes to avoid workflow errors
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update VigilantOnion results" && git push)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
