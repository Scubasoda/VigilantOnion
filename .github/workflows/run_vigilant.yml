name: VigilantOnion Persistent Spider

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

# Added explicit permissions to allow the bot to commit back to your repo
permissions:
  contents: write

jobs:
  spider:
    runs-on: ubuntu-latest
    concurrency: 
      group: spider-group
      cancel-in-progress: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          # Fetch all history so the git commit doesn't fail on a shallow clone
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          # Added python3-dev and ensured yara is installed correctly
          sudo apt-get install -y tor libyara-dev yara python3-dev
          sudo service tor start
          # Wait for Tor
          for i in {1..10}; do if nc -z localhost 9050; then echo "Tor is ready"; break; fi; sleep 2; done

      - name: Patch and Install
        run: |
          # 1. Ensure the directory exists BEFORE the script runs
          mkdir -p database
          
          # 2. Fix legacy imports
          grep -rl "from BeautifulSoup import BeautifulSoup" . | xargs sed -i 's/from BeautifulSoup import BeautifulSoup/from bs4 import BeautifulSoup/g' || true
          
          # 3. Upgrade pip and install
          python -m pip install --upgrade pip
          # Force reinstall yara-python to ensure it links to the system libyara
          pip install --force-reinstall yara-python
          pip install -r requirements.txt

      - name: Discovery Phase
        run: |
          # Added a check to see if the database folder is there
          ls -d database
          python3 observer.py --config config/config.yml --search -e "gist,reddit,cybersecuritynews,discoverdarkwebservice" || true

      - name: Crawl Phase
        run: |
          echo "--- Scan Run: $(date) ---" >> results.txt
          # We add PYTHONPATH=. to make sure it sees the utils folder correctly
          export PYTHONPATH=$PYTHONPATH:.
          python3 observer.py --config config/config.yml --crawler >> results.txt 2>&1 || true
      - name: Commit Database and Results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Create the folder if it doesn't exist so git add doesn't fail
          mkdir -p database
          
          # Add the results text and the SQLite database
          git add results.txt database/
          
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Spider Update: $(date +'%Y-%m-%d')"
            git push
          else
            echo "No changes to commit."
          fi
