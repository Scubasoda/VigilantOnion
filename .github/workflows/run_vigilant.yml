name: VigilantOnion Persistent Spider

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *' # Runs every night at midnight

jobs:
  spider:
    runs-on: ubuntu-latest
    # Prevent multiple runs from overwriting each other if they overlap
    concurrency: 
      group: spider-group
      cancel-in-progress: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tor libyara-dev
          sudo service tor start
          sleep 15 # Give Tor a moment to establish a circuit

      - name: Patch and Install
        run: |
          # Fixing the BeautifulSoup 3 vs 4 issue
          sed -i 's/beautifulsoup/beautifulsoup4/' requirements.txt
          echo "PySocks" >> requirements.txt
          sed -i 's/from BeautifulSoup import BeautifulSoup/from bs4 import BeautifulSoup/' observer.py
          pip install -r requirements.txt

      - name: Discovery Phase (Finding Seeds)
        run: |
          # This finds onion links shared on the "Clear Web"
          python3 observer.py --config config/config.yml --search -e "gist,reddit,cybersecuritynews,discoverdarkwebservice" || true

      - name: Crawl Phase (Spidering the Darknet)
        run: |
          # This crawls the links found in the discovery phase
          # We use '>>' to append to results.txt so you keep a history
          echo "--- Scan Run: $(date) ---" >> results.txt
          python3 observer.py --config config/config.yml --crawler >> results.txt 2>&1 || true

      - name: Commit Database and Results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add the results file and the database folder
          git add results.txt database/
          
          # Commit only if changes exist
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Spider Update: Found new sites and updated DB"
            git push
          else
            echo "No new data found in this run."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
