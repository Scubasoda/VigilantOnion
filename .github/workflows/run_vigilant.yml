name: VigilantOnion Persistent Spider

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

# Added explicit permissions to allow the bot to commit back to your repo
permissions:
  contents: write

jobs:
  spider:
    runs-on: ubuntu-latest
    concurrency: 
      group: spider-group
      cancel-in-progress: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          # Fetch all history so the git commit doesn't fail on a shallow clone
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          # Added yara to match libyara-dev
          sudo apt-get install -y tor libyara-dev yara
          sudo service tor start
          # Better check: Wait until Tor is actually listening on port 9050
          for i in {1..10}; do if nc -z localhost 9050; then echo "Tor is ready"; break; fi; echo "Waiting for Tor..."; sleep 2; done

      - name: Patch and Install
        run: |
          # Use the modernized requirements we discussed
          # We add yara-python here because it's required for the libyara-dev you installed
          echo "yara-python" >> requirements.txt
          echo "PySocks" >> requirements.txt
          
          # Maintain your existing fixes for the old code base
          sed -i 's/beautifulsoup/beautifulsoup4/' requirements.txt
          sed -i 's/from BeautifulSoup import BeautifulSoup/from bs4 import BeautifulSoup/' observer.py || true
          
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Discovery Phase (Finding Seeds)
        run: |
          # The || true ensures the workflow continues even if a search engine blocks the runner
          python3 observer.py --config config/config.yml --search -e "gist,reddit,cybersecuritynews,discoverdarkwebservice" || true

      - name: Crawl Phase (Spidering the Darknet)
        run: |
          echo "--- Scan Run: $(date) ---" >> results.txt
          # Using 'timeout' to ensure the spider doesn't run forever and hit GitHub's 6-hour limit
          timeout 5h python3 observer.py --config config/config.yml --crawler >> results.txt 2>&1 || true

      - name: Commit Database and Results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Create the folder if it doesn't exist so git add doesn't fail
          mkdir -p database
          
          # Add the results text and the SQLite database
          git add results.txt database/
          
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Spider Update: $(date +'%Y-%m-%d')"
            git push
          else
            echo "No changes to commit."
          fi
